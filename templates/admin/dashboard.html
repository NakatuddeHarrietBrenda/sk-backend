{% extends "admin/base_site.html" %}

{% block content %}

<style>
.dashboard {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-top: 20px;
}

.card {
    padding: 20px;
    border-radius: 12px;
    color: white;
    text-align: center;
    font-size: 18px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

.blue { background: #007bff; }
.green { background: #28a745; }
.orange { background: #fd7e14; }
.red { background: #dc3545; }

canvas {
    margin-top: 40px;
    background: white;
    padding: 20px;
    border-radius: 12px;
}
</style>

<h2>SK Property Dashboard</h2>

<div class="dashboard">

    <div class="card blue">
        Properties<br>
        {{ total_properties }}
    </div>

    <div class="card green">
        Users<br>
        {{ total_users }}
    </div>

    <div class="card orange">
        Payments<br>
        {{ total_payments }}
    </div>

    <div class="card red">
        Messages<br>
        {{ total_messages }}
    </div>

</div>

<!-- SAFE JSON DATA -->
{{ labels|json_script:"labels-data" }}
{{ data|json_script:"values-data" }}

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<canvas id="propertyChart"></canvas>

<script>
const labels = JSON.parse(document.getElementById('labels-data').textContent);
const data = JSON.parse(document.getElementById('values-data').textContent);

const ctx = document.getElementById('propertyChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: labels,
        datasets: [{
            label: 'Properties by Location',
            data: data,
            backgroundColor: '#007bff'
        }]
    }
});
</script>

{% endblock %}
